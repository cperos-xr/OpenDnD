services:
  openclaw-gateway:
    build:
      context: .
      args:
        - OPENCLAW_INSTALL_BROWSER=true
        - OPENCLAW_ACCENT_COLOR=${OPENCLAW_ACCENT_COLOR:-}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
      OBSIDIAN_VAULT_PATH: /home/node/.openclaw/workspace/MyAI-Vault
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18791}:18791"
      - "${OPENCLAW_BRIDGE_PORT:-18792}:18792"
    init: true
    restart: unless-stopped
    command:
      [
        "bash", "-c",
        "chmod -R 755 /app/extensions && exec node openclaw.mjs gateway --bind lan --port 18791 --allow-unconfigured"
      ]

  openclaw-cli:
    build:
      context: .
      args:
        - OPENCLAW_INSTALL_BROWSER=true
        - OPENCLAW_ACCENT_COLOR=${OPENCLAW_ACCENT_COLOR:-}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      BROWSER: echo
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
      OBSIDIAN_VAULT_PATH: /home/node/.openclaw/workspace/MyAI-Vault
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "openclaw.mjs"]
